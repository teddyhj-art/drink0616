<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> 치평중학교 교직원 연수 주문 </title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

    // ===================================================
    // ★ Supabase 설정값 ★
    // ===================================================
    const supabaseUrl = 'https://peoogqwjphvayngepfsn.supabase.co';
    const supabaseKey = 'sb_publishable_a_HXX58Hxh3VHMhgdCOurw_ptSwJmSK';
    // ===================================================

    let supabase;
    window._orders = [];
    window._isAdminAuthenticated = false;

    // ======읍천리 메뉴 데이터 (카테고리별 분류) ======
    const menuData = {
      "☕ 커피": {
        "아메리카노": 3500, "카페라떼": 4000,
        "바닐라빈라떼": 4800, "콜드브루": 4800, "콜드브루라떼": 4800, "복티샷(아샷추)": 4800
      },
      "🥛 라떼": {
        "딸기밭라떼": 5900, "망고밭라떼": 5900, "멜론밭라떼": 5900, "블루베리밭라떼": 5900,
        "쑥라떼": 4900, "미숫가루": 4700, "토피넛라떼": 4900, "밀크티라떼": 5500, "말차라떼": 4900,
      },
      "🍧 에이드": {
        "한라봉에이드": 4900, "레몬에이드": 4900, "자몽에이드": 4900, "자두에이드": 4900, "ABC쥬스": 5900,
        "청포도에이드": 4900, "매실에이드": 4900,
      },
      "🍵 티(TEA)": {
        "유자티": 4000, "레몬얼그레이티": 4500, "캐모마일티": 4000, "쌍화차": 4900, "문경오미자차": 4200,
      },
      "🥪 토스트 (간식)": {
        "치킨또띠아랩": 5500, "콘치즈토스트": 5500, "햄치즈토스트": 5800, "누텔라토스트": 5500,
        "쑥쑥떡쿠키": 3900, "솔티크림깨찰빵": 3900
      }
    };

    // 검증 및 총액 계산용 단일 객체
    const menuPrices = {};
    for (const category in menuData) {
      for (const item in menuData[category]) {
        menuPrices[item] = menuData[category][item];
      }
    }

    // ====== 초기화 함수 ======
    function initApp() {
      populateDataList();
      renderCategoryToggles();
      initSupabase();
    }

    // 자동완성(Datalist) 목록 채우기
    function populateDataList() {
      const dataList = document.getElementById('menu-options');
      for (const menu in menuPrices) {
        const option = document.createElement('option');
        option.value = menu;
        dataList.appendChild(option);
      }
    }

    // 카테고리 토글(접기/펴기) 렌더링
    function renderCategoryToggles() {
      const container = document.getElementById('category-container');
      
      for (const [category, items] of Object.entries(menuData)) {
        const details = document.createElement('details');
        details.className = "bg-gray-50 border border-gray-200 rounded-lg overflow-hidden group";
        
        const summary = document.createElement('summary');
        summary.className = "cursor-pointer font-bold text-sm text-gray-800 bg-gray-100/50 px-4 py-3 hover:bg-gray-200 transition-colors list-none flex justify-between items-center";
        summary.innerHTML = `${category} <svg class="w-4 h-4 text-gray-400 group-open:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>`;
        
        const itemContainer = document.createElement('div');
        itemContainer.className = "p-3 flex flex-wrap gap-2 bg-white border-t border-gray-200";
        
        for (const [itemName, price] of Object.entries(items)) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = "text-xs px-3 py-1.5 bg-green-50 text-green-800 border border-green-200 rounded-full hover:bg-green-600 hover:text-white hover:border-green-600 transition-all font-medium";
          btn.textContent = `${itemName} (${price.toLocaleString()}원)`;
          btn.onclick = () => {
            document.getElementById('menuInput').value = itemName;
            details.removeAttribute('open'); // 클릭 후 토글 닫기
            // 시각적 피드백 효과
            document.getElementById('menuInput').classList.add('ring-2', 'ring-green-500', 'bg-green-50');
            setTimeout(() => {
              document.getElementById('menuInput').classList.remove('ring-2', 'ring-green-500', 'bg-green-50');
            }, 300);
          };
          itemContainer.appendChild(btn);
        }
        
        details.appendChild(summary);
        details.appendChild(itemContainer);
        container.appendChild(details);
      }
    }

    function initSupabase() {
      try {
        supabase = createClient(supabaseUrl, supabaseKey);
        
        // 연결 성공 시 UI 업데이트
        document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-green-400 animate-pulse shadow-[0_0_10px_#69f0ae]';
        document.getElementById('status-text').textContent = '정상 작동 중 (Supabase)';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').classList.remove('bg-gray-400', 'cursor-not-allowed');
        document.getElementById('submit-btn').classList.add('bg-green-900', 'hover:bg-green-800');
        
        subscribeOrders();
      } catch (e) {
        console.error('Supabase 초기화 오류:', e);
        showModal('데이터베이스 설정이 올바르지 않습니다.\nHTML 파일 상단의 설정을 확인해주세요.');
      }
    }

    async function fetchOrders() {
      const { data, error } = await supabase
        .from('orders')
        .select('*')
        .order('timestamp', { ascending: true });
        
      if (error) {
        console.error('데이터 불러오기 실패:', error);
      } else {
        window._orders = data;
        renderOrderSummary(data); 
      }
    }

    // 실시간 동기화
    function subscribeOrders() {
      fetchOrders(); 
      
      supabase
        .channel('public:orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, payload => {
          fetchOrders(); 
        })
        .subscribe();
    }

    // ====== 개별 삭제 기능 ======
    window.deleteOrder = async function(orderId) {
      if (!window._isAdminAuthenticated) {
        showModal('권한이 없습니다. 관리자 로그인을 먼저 진행해주세요.');
        return;
      }
      if (!confirm('정말 이 주문을 삭제하시겠습니까?')) return;

      try {
        const { error } = await supabase.from('orders').delete().eq('id', orderId);
        if (error) throw error;
        showModal('주문이 성공적으로 삭제되었습니다.');
        fetchOrders();
      } catch (e) {
        console.error(e);
        showModal('삭제 중 오류가 발생했습니다.');
      }
    };

    // ====== 전체 삭제 기능 ======
    window.deleteAllOrders = async function() {
      if (!window._isAdminAuthenticated) {
        showModal('권한이 없습니다. 관리자 로그인을 먼저 진행해주세요.');
        return;
      }
      
      const ordersCount = window._orders ? window._orders.length : 0;
      if (ordersCount === 0) {
        showModal('삭제할 주문 내역이 없습니다.');
        return;
      }

      if (!confirm(`정말 접수된 ${ordersCount}건의 모든 주문 내역을 삭제하시겠습니까?\n★ 이 작업은 되돌릴 수 없습니다!`)) {
        return;
      }

      const btn = document.getElementById('delete-all-btn');
      const originalText = btn.innerHTML;
      btn.innerHTML = '삭제 중...';
      btn.disabled = true;

      try {
        const { error } = await supabase.from('orders').delete().not('id', 'is', null);
        if (error) throw error;
        showModal('모든 주문 데이터가 성공적으로 초기화되었습니다.');
        fetchOrders();
      } catch (e) {
        console.error(e);
        showModal('전체 삭제 중 오류가 발생했습니다.');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    };

    // ====== 실시간 통계 및 테이블 렌더링 ======
    function renderOrderSummary(orders) {
      document.getElementById('order-count').textContent = orders.length;

      let totalAmount = 0;
      const menuCounts = {};

      orders.forEach(o => {
        const priceNum = parseInt(o.price.replace(/[^0-9]/g, ''), 10) || 0;
        totalAmount += priceNum;

        if (menuCounts[o.beverage_name]) {
          menuCounts[o.beverage_name]++;
        } else {
          menuCounts[o.beverage_name] = 1;
        }
      });

      document.getElementById('total-amount').textContent = totalAmount.toLocaleString('ko-KR') + '원';

      const summaryContainer = document.getElementById('menu-summary-container');
      if (orders.length === 0) {
        summaryContainer.innerHTML = '<p class="text-gray-400 text-sm py-2">주문된 메뉴가 없습니다.</p>';
      } else {
        summaryContainer.innerHTML = Object.entries(menuCounts).map(([name, count]) => `
          <div class="bg-green-50/60 border border-green-100 px-3 py-2 rounded-xl flex justify-between items-center text-sm shadow-sm">
            <span class="font-bold text-gray-800">${name}</span>
            <span class="font-extrabold text-green-800 bg-white border border-green-200 px-2 py-0.5 rounded-md">${count}개</span>
          </div>
        `).join('');
      }

      const headerRow = document.getElementById('order-table-header');
      headerRow.innerHTML = `
        <th class="py-2.5 px-4 font-bold text-gray-600 bg-gray-50/50 w-16">순번</th>
        <th class="py-2.5 px-4 font-bold text-gray-600 bg-gray-50/50 w-28">성함</th>
        <th class="py-2.5 px-4 font-bold text-gray-600 bg-gray-50/50">주문 메뉴</th>
        <th class="py-2.5 px-4 font-bold text-gray-600 bg-gray-50/50">추가 비고</th>
        <th class="py-2.5 px-4 font-bold text-gray-600 bg-gray-50/50 w-24">시간</th>
        ${window._isAdminAuthenticated ? '<th class="py-2.5 px-4 font-bold text-gray-600 bg-gray-50/50 w-16 text-center">삭제</th>' : ''}
      `;

      const tbody = document.getElementById('order-table-body');
      const colspan = window._isAdminAuthenticated ? 6 : 5;
      
      if (orders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${colspan}" class="py-8 text-center text-gray-400">아직 접수된 주문이
