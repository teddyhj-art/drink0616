<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> 치평중학교 교직원 연수 음료 주문 </title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

    // ===================================================
    // ★ 여기에 본인의 Supabase 설정값을 입력하세요 ★
    // ===================================================
    const supabaseUrl = 'https://peoogqwjphvayngepfsn.supabase.co';
    const supabaseKey = 'sb_publishable_a_HXX58Hxh3VHMhgdCOurw_ptSwJmSK';
    // ===================================================

    let supabase;

    // ====== 음료 데이터 ======
    const categories = ['커피', '시그니처 라떼', '티(Tea)'];
    const beverages = [
      { id: 'americano',    category: '커피',        name: '[무조건] 아메리카노',        description: '갈증 해소, 일상에 활력을 불어 넣어 줄 읍천리 아메리카노',            price: '3,500원' },
      { id: 'cafelatte',   category: '커피',        name: '[부드러운] 카페라떼',          description: '읍천리 원두와 고소한 우유의 만남으로 부드럽게 즐기는 음료',          price: '4,000원' },
      { id: 'vanillabean', category: '커피',        name: '[로맨틱한] 바닐라빈라떼',       description: '읍천리 바닐라라떼의 리뉴얼 상품! 더욱 깊어진 풍미',                price: '4,900원' },
      { id: 'hazelnut',    category: '커피',        name: '[향이가득] 헤이즐넛',          description: '헤이즐넛 풍미가 감미롭게 어우러진 커피',                            price: '4,800원' },
      { id: 'hazelnutlatte',category: '커피',       name: '[향이가득] 헤이즐넛라떼',      description: '헤이즐넛 풍미가 감미롭게 어우러진 라떼',                            price: '5,000원' },
      { id: 'cafemocha',   category: '커피',        name: '[달콤한] 카페모카',            description: '부드러운 라떼에 진한 초콜릿 풍미가 가득한 라떼',                    price: '4,800원' },
      { id: 'coldbrew',    category: '커피',        name: '[차별된 추출] 콜드브루',        description: '(ONLY ICE) 읍천리만의 특별한 추출 방식으로 맛과 향이 특별한 커피', price: '4,800원' },
      { id: 'misugaru',    category: '시그니처 라떼', name: '[판매율 1위] 미숫가루',      description: '가장 한국적인 것이 가장 세계적인 것이다. 든든한 시골 할매 황금믹스', price: '4,700원' },
      { id: 'matchalatte', category: '시그니처 라떼', name: '[부드러운] 제주 말차라떼',  description: '말차와 우유가 만나 진하고 부드러운 힐링 음료',                      price: '4,900원' },
      { id: 'peachshot',   category: '시그니처 라떼', name: '[숙취해소] 복티샷 (아샷추)', description: '달달한 복숭아 아이스티에 에스프레소 샷 퐁당',                      price: '4,800원' },
      { id: 'ssanghwatea', category: '티(Tea)',    name: '[전통한방] 쌍화차',            description: '피로 회복과 면역력 강화, 기운을 북돋아줄 읍천리 한방 쌍화차',       price: '4,900원' },
      { id: 'yujaginger',  category: '티(Tea)',    name: '[심신안정] 유자생강차',         description: '유자의 달콤한 맛과 생강의 스파이시한 맛이 조화롭게 이루어진 차',   price: '4,500원' },
      { id: 'applepeach',  category: '티(Tea)',    name: '[시원상쾌] 애플피치우롱티',     description: '사과와 복숭아 맛이 가미되어 우롱차의 깊은 맛과 환상적인 밸런스',   price: '4,500원' },
      { id: 'chamomile',   category: '티(Tea)',    name: '[리뉴얼 컴백] 캐모마일 티',    description: '더욱더 보완되어 다시 돌아온 읍천리만의 깔끔한 허브티',              price: '4,000원' },
    ];

    window._selectedBeverage = null;
    window._isAdminAuthenticated = false;
    window._orders = [];

    // ====== 초기화 함수 ======
    function initApp() {
      renderMenu();
      initSupabase();
    }

    function initSupabase() {
      try {
        supabase = createClient(supabaseUrl, supabaseKey);
        
        // 연결 성공 시 UI 업데이트
        document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-green-400 animate-pulse shadow-[0_0_10px_#69f0ae]';
        document.getElementById('status-text').textContent = '정상 작동 중 (Supabase)';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').classList.remove('bg-gray-400', 'cursor-not-allowed');
        document.getElementById('submit-btn').classList.add('bg-green-900', 'hover:bg-green-800');
        
        subscribeOrders();
      } catch (e) {
        console.error('Supabase 초기화 오류:', e);
        showModal('데이터베이스 설정이 올바르지 않습니다.\nHTML 파일 상단의 설정을 확인해주세요.');
      }
    }

    async function fetchOrders() {
      const { data, error } = await supabase
        .from('orders')
        .select('*')
        .order('timestamp', { ascending: true });
        
      if (error) {
        console.error('데이터 불러오기 실패:', error);
      } else {
        window._orders = data;
        renderAdminTable(data);
      }
    }

    // 실시간 동기화 (Realtime)
    function subscribeOrders() {
      fetchOrders(); // 최초 데이터 가져오기
      
      supabase
        .channel('public:orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, payload => {
          fetchOrders(); // 데이터에 변화가 생기면 다시 표 그리기
        })
        .subscribe();
    }

    // 삭제 기능 함수 (수정됨)
    window.deleteOrder = async function(orderId) {
      if (!confirm('정말 이 주문을 삭제하시겠습니까?')) {
        return;
      }

      if (!orderId || orderId === 'undefined') {
        showModal('오류: 삭제할 주문의 고유 ID(식별자)를 찾을 수 없습니다.');
        return;
      }

      try {
        const { error } = await supabase
          .from('orders')
          .delete()
          .eq('id', orderId);

        if (error) throw error;

        showModal('주문이 성공적으로 삭제되었습니다.');
        
        // 삭제 후 화면의 데이터 표만 조용히 업데이트
        fetchOrders();

      } catch (e) {
        console.error(e);
        showModal('삭제 중 오류가 발생했습니다.');
      }
    };

    // ====== 메뉴 렌더링 ======
    function renderMenu() {
      const container = document.getElementById('menu-container');
      if (!container) return;
      container.innerHTML = ''; 
      
      categories.forEach(cat => {
        const catBeverages = beverages.filter(b => b.category === cat);
        let cardsHtml = catBeverages.map(b => `
          <div class="beverage-card bg-white rounded-xl p-5 shadow-sm flex flex-col justify-between min-h-[120px]"
               id="card-${b.id}">
            <div>
              <div class="flex justify-between items-start mb-2">
                <h4 class="text-base font-bold text-gray-900 pr-8">${b.name}</h4>
                <div class="check-circle w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center flex-shrink-0">
                  <svg class="check-icon w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                </div>
              </div>
              <p class="text-xs text-gray-500 leading-relaxed line-clamp-2">${b.description}</p>
            </div>
            <div class="mt-3 pt-3 border-t border-gray-100">
              <span class="font-extrabold text-green-900">${b.price}</span>
            </div>
          </div>
        `).join('');

        container.innerHTML += `
          <div class="mb-8">
            <h3 class="text-green-900 font-bold text-lg mb-4 flex items-center">
              <span class="w-2 h-2 bg-green-500 rounded-full mr-2 inline-block"></span>${cat}
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${cardsHtml}</div>
          </div>
        `;
      });

      // 카드 클릭 이벤트 바인딩
      beverages.forEach(b => {
        const card = document.getElementById(`card-${b.id}`);
        if (card) {
          card.addEventListener('click', () => window.selectBeverage(b.id));
        }
      });
    }

    // ====== 관리자 테이블 그리기 (오류 수정됨) ======
    function renderAdminTable(orders) {
      document.getElementById('order-count').textContent = orders.length;
      const tbody = document.getElementById('admin-table-body');
      
      if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="py-12 text-center text-gray-400">아직 접수된 주문이 없습니다.</td></tr>';
        return;
      }
      
      tbody.innerHTML = orders.map((o, i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="py-3 px-4 text-gray-500 font-medium">${i + 1}</td>
          <td class="py-3 px-4 font-bold text-gray-900">${o.teacher_name}</td>
          <td class="py-3 px-4 text-green-900 font-medium">${o.beverage_name}</td>
          <td class="py-3 px-4 text-gray-600">${o.memo || '-'}</td>
          <td class="py-3 px-4 text-gray-400 text-sm">${new Date(o.timestamp).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}</td>
          
          <td class="py-3 px-4 text-center">
            <button type="button" onclick="deleteOrder('${o.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="주문 삭제">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    // ====== HTML 전역 연동 함수들 ======
    window.selectBeverage = function(id) {
      const bev = beverages.find(b => b.id === id);
      window._selectedBeverage = bev;
      document.querySelectorAll('.beverage-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('card-' + id).classList.add('selected');
    }

    window.submitOrder = async function() {
      const teacherName = document.getElementById('teacherName').value.trim();
      const selectedBeverage = window._selectedBeverage;
      const memo = document.getElementById('additionalMemo').value.trim();

      if (!teacherName) { showModal('성함을 정확하게 입력해 주세요.'); return; }
      if (!selectedBeverage) { showModal('음료를 선택해 주세요.'); return; }
      if (!supabase) { showModal('데이터베이스 연결 중입니다. 잠시 후 다시 시도해주세요.'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = `<svg class="animate-spin w-6 h-6 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>주문 전송 중...`;

      try {
        const { error } = await supabase
          .from('orders')
          .insert([
            {
              teacher_name: teacherName,
              beverage_name: selectedBeverage.name,
              price: selectedBeverage.price,
              memo: memo || '',
              timestamp: Date.now()
            }
          ]);
          
        if (error) throw error;

        showModal(`[${teacherName}] 선생님,\n[${selectedBeverage.name}] 주문이 완료되었습니다!`);
        document.getElementById('teacherName').value = '';
        document.getElementById('additionalMemo').value = '';
        window._selectedBeverage = null;
        document.querySelectorAll('.beverage-card').forEach(c => c.classList.remove('selected'));
      } catch (e) {
        showModal('주문 전송 중 오류가 발생했습니다. 다시 시도해 주세요.');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>선택 완료 및 주문 제출하기</span><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;
      }
    };

    window.sendToSheets = async function() {
      const orders = window._orders || [];
      if (orders.length === 0) { showModal('전송할 주문이 없습니다.'); return; }

      const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaBXKhDpZ6INojoaPNgUD3J2a1y4lKi0C3sOAqJwnsP-pvPVsDDZcgiv5ApMW8c7Gw/exec';

      const btn = document.getElementById('send-sheets-btn');
      btn.disabled = true;
      btn.textContent = '전송 중...';

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orders)
        });
        showModal('구글 시트로 성공적으로 전송(요청)되었습니다!\n(시트를 확인해주세요)');
      } catch (e) {
        showModal('전송 중 오류가 발생했습니다.');
      } finally {
        btn.disabled = false;
        btn.textContent = '구글 시트로 보내기';
      }
    };

    function showModal(msg) {
      document.getElementById('modal-message').textContent = msg;
      document.getElementById('modal-overlay').classList.add('open');
    }
    window.closeModal = function() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    window.openAdminPage = function() {
      if (window._isAdminAuthenticated) {
        document.getElementById('admin-dashboard').classList.add('open');
      } else {
        document.getElementById('admin-login-modal').classList.add('open');
        setTimeout(() => document.getElementById('admin-password').focus(), 100);
      }
    }
    window.closeAdminLogin = function() {
      document.getElementById('admin-login-modal').classList.remove('open');
      document.getElementById('admin-password').value = '';
    }
    window.closeAdminDashboard = function() {
      document.getElementById('admin-dashboard').classList.remove('open');
    }

    function verifyPassword(input) {
      let hash = 0;
      for (let i = 0; i < input.length; i++) {
        const char = input.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash === 1480551; // '0315'
    }

    window.handleAdminLogin = function() {
      const pw = document.getElementById('admin-password').
